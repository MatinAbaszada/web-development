<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-slate-100 min-h-screen p-4 md:p-6">
    <div
      class="app-container w-full max-w-6xl h-[92vh] mx-auto bg-white border border-slate-200 rounded-xl shadow-sm flex overflow-hidden"
    >
      <aside
        class="sidebar w-64 bg-slate-50 border-r border-slate-200 flex flex-col"
      >
        <button
          class="new-chat-btn m-4 px-4 py-3 bg-blue-600 text-white rounded-md font-semibold hover:bg-blue-700 transition-colors"
        >
          New Chat
        </button>

        <div class="px-4 pb-4 border-b border-slate-200">
          <label
            for="modelSelector"
            class="block text-xs font-semibold text-slate-600 mb-2"
            >Model</label
          >
          <select
            id="modelSelector"
            class="w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
          ></select>
        </div>

        <nav class="conversations-list flex-1 overflow-y-auto p-3">
          <div class="conversation-item active px-3 py-2 rounded-md mb-2">
            <div class="truncate">Project Notes</div>
            <div class="text-xs text-slate-500 mt-1">Today</div>
          </div>
          <div class="conversation-item px-3 py-2 rounded-md mb-2">
            <div class="truncate">Trip Plan</div>
            <div class="text-xs text-slate-500 mt-1">Yesterday</div>
          </div>
          <div class="conversation-item px-3 py-2 rounded-md">
            <div class="truncate">Homework Ideas</div>
            <div class="text-xs text-slate-500 mt-1">2 days ago</div>
          </div>
        </nav>
      </aside>

      <div class="chat-main flex-1 flex flex-col bg-white">
        <header class="chat-header bg-slate-800 text-white px-6 py-4">
          <h1 class="text-lg font-semibold">Assistant Chat</h1>
          <p class="text-xs text-slate-300 mt-1">Status: connected</p>
        </header>

        <main
          id="messageList"
          class="message-list flex-1 overflow-y-auto px-4 py-5 md:px-6 md:py-6"
          aria-live="polite"
        ></main>

        <footer
          class="chat-input-area border-t border-slate-200 bg-white px-4 py-3 md:px-6 md:py-4 flex gap-3"
        >
          <textarea
            id="messageInput"
            class="chat-input flex-1 border border-slate-300 rounded-md px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Type your message"
            aria-label="Message input"
            rows="1"
          ></textarea>
          <button
            id="sendButton"
            class="send-button min-w-[90px] px-4 rounded-md bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
            aria-label="Send message"
          >
            Send
          </button>
        </footer>
      </div>
    </div>

    <script src="./js/main.js" type="module"></script>
  </body>
</html>
